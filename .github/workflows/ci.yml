name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    uses: MCPmed/.github/.github/workflows/reusable-python-ci.yml@main
    with:
      package-name: geomcp
      python-versions: "['3.10','3.11','3.12']"
      install-extras: "dev"
      run-ruff: true
      run-black: true
      run-mypy: false
      run-tests: true
      coverage: true
